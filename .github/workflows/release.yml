name: release

# Cut a release by pushing a tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# Builds the binary for macOS (arm64 + x64) and Linux (x64) and attaches the
# tarballs to the GitHub Release for that tag. Uses the built-in GITHUB_TOKEN —
# no secrets to configure.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin tokenferno --target ${{ matrix.target }}

      - name: Package
        run: tar -C "target/${{ matrix.target }}/release" -czf "tokenferno-${{ matrix.target }}.tar.gz" tokenferno

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: tokenferno-${{ matrix.target }}.tar.gz
